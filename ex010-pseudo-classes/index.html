<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo-classes</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        
        div{
            background-color: lightgray;
            text-align: center;
            display: inline-block;
            border: 1px solid black;
            height: 200px;
            width: 200px;
        }

        div:hover{
            background-color: yellow;
        }

        #avançar{
            text-align: end;
            text-decoration: underline;
            color: blue;
        }

    </style>
</head>
<body>
    <h1>Primeiro exemplo de hover</h1>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
    <P class="Fim">Fim do exemplo</P>
    <p id="avançar"> <a href="hover.html">avançar</a></p>
</body>
</html>
