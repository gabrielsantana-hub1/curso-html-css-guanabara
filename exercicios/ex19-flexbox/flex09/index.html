<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.conteiner{
            display: flex;
            background-color: lightsalmon;
            flex-flow: row nowrap;
        }

        div.item{
            text-align: center;
            background-color: aliceblue;
            border: 1px solid black;
            flex-basis: 150px;
        }

        #u1{
            flex-grow: 0;
            flex-shrink: 2;
        }

        #d2{
            flex-grow: 3;
            flex-shrink: 0;
        }

        #t3{
            flex-grow: 1;
            flex-shrink: 1;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="u1">A</div>
        <div class="item" id="d2">B</div>
        <div class="item" id="t3">C</div>
    </div>

</body>
</html>
