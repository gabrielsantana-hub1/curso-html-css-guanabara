<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        main{
            display: flex;
            align-items: center;
            justify-content: center;

            height: 100vh;
            width: 100vw;

            background-color: rgba(103, 103, 180, 0.432);
        }

        section{
            height: 200px;
            width: 200px;
            background-color: aliceblue;
        }

    </style>
</head>
<body>
    <main class="conteiner">
        <section>
            <h1>Tela de login</h1>
        </section>
    </main>
</body>
</html>
