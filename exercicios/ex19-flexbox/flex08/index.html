<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.conteiner {
            display: flex;
            background-color: lightsalmon;
            flex-flow: row wrap;
            height: 400px;
            align-items: start;
            justify-content: space-between;
        }

        div.item {
            padding: 20px;
            text-align: center;
            background-color: aliceblue;
            border: 1px solid black;
        }

        div#i1 {
            align-self: center ;
        }

        div#i2 {
            align-self: flex-end;
        }

        div#i3 {
            align-self: flex-start;
        }

        div#i4 {
            align-self: auto;
        }

        div#i5 {
            align-self: flex-end;
        }

        div#i6 {
            align-self: center;
        }

        div#i7 {
            align-self: stretch;
        }
    </style>
</head>

<body>
    <div class="conteiner">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>

    </div>


</body>

</html>
