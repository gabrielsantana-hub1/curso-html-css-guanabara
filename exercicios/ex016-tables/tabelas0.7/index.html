<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da tabela02</title>

    <style>
        
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        img{
            width: 347px;
            height: 120px;
        }

        table{
            width: 350px;
        }

        td{
            border: 1px solid black;
            text-align: center ;
        }

    </style>

</head>
<body>
    
    <h1>Desafio de manipulação de tabela 02 </h1>

    <img src="Captura de tela 2026-07-15 151626.png" alt="exemplo da tabela02">

    <table>

        <tr>
            <td colspan="4">A</td>
            <td rowspan="4">B</td>
        </tr>

        <tr>
            <td rowspan="4">C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>

        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>

        <tr>
            <td>J</td>
            <td>L</td>
            <td>M</td>
        </tr>

        <tr>
            <td colspan="4">N</td>
        </tr>

    </table>

</body>
</html>
