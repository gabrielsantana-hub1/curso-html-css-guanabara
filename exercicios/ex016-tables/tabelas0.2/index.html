<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>

    <style>

        table{
            height: 400px;
            width: 400px;
            border-collapse: collapse;
        }

        td{
            border: 1px solid black;
            padding-left: 10px;
            text-align: center;
        }

        .es{
            text-align: left;
            vertical-align: top ;
        }

        .di{
            text-align: right;
            vertical-align: bottom;
        }

    </style>
</head>
<body>

    <h1>Primeira tabela</h1>

    <table>

        <tr>
            <td class="es">A1</td>
            <td>B1</td>
            <td class="di">C1</td>
        </tr>

        <tr>
            <td class="es">A2</td>
            <td>B2</td>
            <td class="di">C2</td>
        </tr>

        <tr>
            <td class="es">A3</td>
            <td>B3</td>
            <td class="di">C3</td>
        </tr>

        <tr>
            <td class="es">A4</td>
            <td>B4</td>
            <td class="di">C4</td>
        </tr>

    </table>
    
</body>
</html>
