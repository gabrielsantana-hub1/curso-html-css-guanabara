<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>

        <section id="login">

            <div id="imagem">

            </div>

            <div id="formulario">

                <h1>Login</h1>

                <p>
                    Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu
                    ambiente.
                </p>

                <form action="" method="post">

                    <div class="campo">
                        <span class="material-symbols-outlined">person_shield</span>
                        <input type="email" name="ilogin" id="login" placeholder="Seu email" required>
                        <label for="login">Login</label>
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="password" name="isenha" id="senha" placeholder="Sua senha" required minlength="8" maxlength="15" autocomplete="current-password">
                        <label for="senha">Senha</label>
                    </div>

                    <input type="submit" value="Entrar">
                    <a href="esqueci.html">Esqueci a senha <span class="material-symbols-outlined">mail</span></a>

                </form>

            </div>

        </section>

    </main>

</body>

</html>
